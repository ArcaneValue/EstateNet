name: Deploy OTA Update to Production

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'App.tsx'
      - 'package.json'
      - 'app.json'

jobs:
  update:
    name: EAS Update - Production
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "❌ ERROR: EXPO_TOKEN secret is not set!"
            echo "Please add your Expo token to GitHub Secrets"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Publish OTA Update
        run: |
          eas update --auto --non-interactive --branch production --message "${{ github.event.head_commit.message }}"

      - name: Update Summary
        run: |
          echo "✅ OTA Update Published Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** production" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users will receive this update automatically when they next open the app." >> $GITHUB_STEP_SUMMARY
