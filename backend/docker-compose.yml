version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: estatenet-postgres
    restart: always
    environment:
      POSTGRES_USER: estatenet
      POSTGRES_PASSWORD: estatenet_password
      POSTGRES_DB: estatenet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
